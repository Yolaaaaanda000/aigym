<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Break Card</title>
<style>
  /* ---- Design tokens (Spark Garden 纸感 / 手绘) ---- */
  :root{
    --paper:#f3ead7;        /* 牛皮纸底 */
    --paper-deep:#e7d8b8;
    --ink:#3a3128;          /* 墨色文字 */
    --ink-soft:#7a6f5d;
    --accent:#c8643c;       /* 朱砂橙 (动起来) */
    --accent-cool:#5b7a6a;  /* 拉伸/呼吸 的青绿 */
    --line:#cdbf9f;
    --shadow:rgba(58,49,40,.22);
    --card-w:300px;
    --card-h:420px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:transparent;               /* Electron 里透明; 调试时给个底色 */
    font-family:"PingFang SC","Songti SC",Georgia,serif;
    display:flex;align-items:center;justify-content:center;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  /* 调试时的可见底色, 注入 Electron 时删掉这条 */
  body.debug{background:#9aa89c}

  .stage{ position:relative; width:var(--card-w); height:calc(var(--card-h) + 90px); }

  /* ---- 抽卡牌 ---- */
  .deck{ position:relative; width:var(--card-w); height:var(--card-h);
    perspective:1400px; }
  .card{ position:absolute; inset:0; transform-style:preserve-3d;
    transition:transform .7s cubic-bezier(.2,.8,.2,1); }
  .face{ position:absolute; inset:0; backface-visibility:hidden;
    border-radius:14px; box-shadow:0 14px 30px var(--shadow);
    background:var(--paper);
    /* 纸纹 */
    background-image:
      radial-gradient(circle at 30% 20%, rgba(255,255,255,.5), transparent 40%),
      repeating-linear-gradient(0deg, rgba(0,0,0,.012) 0 2px, transparent 2px 4px);
    border:1px solid var(--line);
    overflow:hidden;
  }
  .back{ display:flex; align-items:center; justify-content:center; flex-direction:column;
    background:var(--paper-deep); }
  .back .mark{ width:120px;height:120px;border:2px dashed var(--accent);
    border-radius:50%; display:flex;align-items:center;justify-content:center;
    font-size:54px; color:var(--accent); }
  .back .hint{ margin-top:22px; color:var(--ink-soft); letter-spacing:3px; font-size:14px;}
  .front{ transform:rotateY(180deg); display:flex; flex-direction:column; padding:22px;}

  /* 翻牌 */
  .deck.flipped .card{ transform:rotateY(180deg); }
  /* 抽卡时轻微抬起+晃动 */
  .deck.dealing .card{ animation:deal .5s ease; }
  @keyframes deal{
    0%{transform:translateY(0) rotateZ(0)}
    30%{transform:translateY(-14px) rotateZ(-3deg)}
    60%{transform:translateY(-6px) rotateZ(2deg)}
    100%{transform:translateY(0) rotateZ(0)}
  }

  /* ---- 动作卡正面 ---- */
  .front .eyebrow{ font-size:12px;letter-spacing:4px;text-transform:uppercase;
    color:var(--accent); margin-bottom:6px;}
  .front .move{ font-size:30px; font-weight:700; color:var(--ink); line-height:1.15;}
  .front .move-en{ font-size:13px; color:var(--ink-soft); margin-top:2px; letter-spacing:1px;}
  .front .emoji{ font-size:84px; text-align:center; margin:18px 0 10px;
    filter:drop-shadow(0 6px 8px var(--shadow)); }
  .front .desc{ font-size:14px;color:var(--ink-soft); line-height:1.6; flex:1;}
  .front .meta{ display:flex; gap:8px; margin-top:8px; }
  .tag{ font-size:11px; padding:3px 9px; border-radius:20px;
    border:1px solid var(--line); color:var(--ink-soft); background:rgba(255,255,255,.4);}
  .tag.goal{ border-color:var(--accent); color:var(--accent); }

  /* ---- 倒计时 ---- */
  .timer{ position:absolute; inset:0; border-radius:14px; background:var(--paper);
    border:1px solid var(--line); box-shadow:0 14px 30px var(--shadow);
    display:none; flex-direction:column; align-items:center; justify-content:center;
    padding:24px; }
  .timer.show{ display:flex; }
  .timer .now{ font-size:22px; color:var(--ink); font-weight:600; text-align:center;}
  .ring{ position:relative; width:200px;height:200px; margin:18px 0;}
  .ring svg{ transform:rotate(-90deg); }
  .ring .track{ fill:none; stroke:var(--line); stroke-width:10; }
  .ring .prog{ fill:none; stroke:var(--accent); stroke-width:10; stroke-linecap:round;
    transition:stroke-dashoffset 1s linear; }
  .ring .count{ position:absolute; inset:0; display:flex;align-items:center;justify-content:center;
    font-size:46px; font-weight:700; color:var(--ink); font-variant-numeric:tabular-nums;}
  .timer .sub{ color:var(--ink-soft); font-size:13px; }

  /* ---- 控制条 ---- */
  .controls{ position:absolute; bottom:0; left:0; right:0; height:64px;
    display:flex; align-items:center; justify-content:center; gap:12px; }
  button{ font-family:inherit; cursor:pointer; border:none; border-radius:24px;
    padding:11px 22px; font-size:14px; font-weight:600; transition:transform .12s, filter .12s;
    -webkit-app-region:no-drag; }
  button:active{ transform:scale(.96); }
  .btn-primary{ background:var(--accent); color:#fff; box-shadow:0 6px 14px var(--shadow);}
  .btn-ghost{ background:transparent; color:var(--ink-soft); }
  .btn-primary:hover{ filter:brightness(1.05);}
  .hidden{ display:none !important; }

  /* 顶部拖拽条（窗口拖动手柄）+ 右上角关闭按钮 */
  .titlebar{ position:absolute; top:0; left:0; right:0; height:30px; z-index:30;
    display:flex; align-items:center; justify-content:flex-end; padding:0 6px;
    -webkit-app-region:drag; cursor:grab; }
  .closeBtn{ width:26px; height:26px; padding:0; border-radius:50%; line-height:1;
    background:rgba(58,49,40,.28); color:#fff; font-size:13px;
    -webkit-app-region:no-drag; transition:background .12s; }
  .closeBtn:hover{ background:var(--accent); }

  /* 完成态小庆祝 */
  .done .front .emoji{ animation:pop .6s ease; }
  @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.25) rotate(8deg)}100%{transform:scale(1)}}

  @media (prefers-reduced-motion:reduce){
    .card,.deck.dealing .card,.front .emoji{transition:none;animation:none}
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="titlebar"><button class="closeBtn" id="closeBtn" title="关闭，下次再练">✕</button></div>
    <!-- 抽卡区 -->
    <div class="deck" id="deck">
      <div class="card" id="card">
        <div class="face back">
          <div class="mark">🦀</div>
          <div class="hint">抽 一 张 · 动 5 分 钟</div>
        </div>
        <div class="face front" id="front">
          <div class="eyebrow" id="goalLabel">力量</div>
          <div class="move" id="moveZh">深蹲</div>
          <div class="move-en" id="moveEn">Squat</div>
          <div class="emoji" id="moveEmoji">🏋️</div>
          <div class="desc" id="moveDesc"></div>
          <div class="meta">
            <span class="tag goal" id="tagGoal">力量</span>
            <span class="tag" id="tagPart">下肢</span>
            <span class="tag" id="tagDur">5 分钟</span>
          </div>
        </div>
      </div>
      <!-- 倒计时盖在卡上 -->
      <div class="timer" id="timer">
        <div class="now" id="timerMove">深蹲</div>
        <div class="ring">
          <svg width="200" height="200" viewBox="0 0 200 200">
            <circle class="track" cx="100" cy="100" r="90"></circle>
            <circle class="prog" id="prog" cx="100" cy="100" r="90"
              stroke-dasharray="565.48" stroke-dashoffset="0"></circle>
          </svg>
          <div class="count" id="count">5:00</div>
        </div>
        <div class="sub" id="timerSub">动起来，等它跑完不如等你练完</div>
      </div>
    </div>

    <!-- 控制条 -->
    <div class="controls" id="controls">
      <button class="btn-primary" id="drawBtn">抽一张</button>
      <button class="btn-ghost" id="skipBtn">这次不练</button>
    </div>
  </div>

<!-- 逻辑全在 breakcard.js（Yolanda 维护）。Claire 改本文件的 markup + CSS 即可。 -->
<script src="breakcard.js"></script>
</body>
</html>
